<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <radialGradient id="glow" cx="65%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="42" fill="#0F172A"/>
  <rect width="192" height="192" rx="42" fill="url(#glow)"/>
  <rect x="1.5" y="1.5" width="189" height="189" rx="40.5" stroke="url(#g1)" stroke-opacity="0.3" stroke-width="3"/>

  <!-- Queue flow vertical track -->
  <line x1="54" y1="54" x2="54" y2="138" stroke="#6366F1" stroke-width="5" stroke-linecap="round" stroke-opacity="0.4"/>

  <!-- Queue nodes (patients) -->
  <circle cx="54" cy="54" r="12" fill="url(#g1)"/>
  <circle cx="54" cy="96" r="12" fill="url(#g1)" opacity="0.7"/>
  <circle cx="54" cy="138" r="12" fill="url(#g1)" opacity="0.35"/>

  <!-- Connectors to cross -->
  <line x1="68" y1="54" x2="92" y2="54" stroke="#818CF8" stroke-width="4" stroke-linecap="round" stroke-opacity="0.6"/>
  <line x1="68" y1="96" x2="92" y2="96" stroke="#818CF8" stroke-width="4" stroke-linecap="round" stroke-opacity="0.38"/>

  <!-- Medical cross -->
  <rect x="110" y="66" width="24" height="60" rx="12" fill="white"/>
  <rect x="92" y="84" width="60" height="24" rx="12" fill="white"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <!-- Subtle radial glow behind cross -->
    <radialGradient id="glow" cx="65%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded background square -->
  <rect width="64" height="64" rx="16" fill="#0F172A"/>

  <!-- Subtle gradient inner glow -->
  <rect width="64" height="64" rx="16" fill="url(#glow)"/>

  <!-- Fine border -->
  <rect x="0.75" y="0.75" width="62.5" height="62.5" rx="15.25" stroke="url(#g1)" stroke-opacity="0.35" stroke-width="1.5"/>

  <!-- Queue track — vertical flow line -->
  <line x1="17" y1="18" x2="17" y2="46" stroke="#6366F1" stroke-width="2" stroke-linecap="round" stroke-opacity="0.45"/>

  <!-- Patient queue dots (3 nodes) -->
  <circle cx="17" cy="18" r="4" fill="url(#g1)"/>
  <circle cx="17" cy="32" r="4" fill="url(#g1)" opacity="0.7"/>
  <circle cx="17" cy="46" r="4" fill="url(#g1)" opacity="0.38"/>

  <!-- Horizontal connectors toward cross -->
  <line x1="23" y1="18" x2="31" y2="18" stroke="#818CF8" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.65"/>
  <line x1="23" y1="32" x2="31" y2="32" stroke="#818CF8" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.4"/>

  <!-- Medical cross — crisp white with subtle indigo tint -->
  <!-- Vertical bar -->
  <rect x="38" y="23" width="8" height="18" rx="4" fill="white"/>
  <!-- Horizontal bar -->
  <rect x="31" y="30" width="22" height="8" rx="4" fill="white"/>
</svg>